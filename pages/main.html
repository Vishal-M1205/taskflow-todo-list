<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../styles/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
</head>
<body data-theme="light">
      <nav class="navbar navbar-expand-lg   shadow-sm sticky-top top-0" id="navBar">
        <div class="container">
          <a href="#" class="navbar-brand fs-4 fw-bold text-theme-primary"><i class="bi bi-check-circle-fill  icon pe-1"></i>TaskMaster</a>
 <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
 </button>
   <div class="navbar-collapse collapse " id="navbarNav">
     <ul class="navbar-nav ms-auto "> 
       
       <li class="nav-item pe-3 pt-3 pt-lg-0">
        <a href="#" class="nav-link text-theme-primary" id="theme" onclick="toggleTheme()"><i class="bi bi-moon-fill fs-4 "></i></a>
       </li>
       <li class="nav-item pt-3 pt-lg-0">
        <button class="btn fw-bold violet-button rounded-pill" id="user"><i class="bi bi-person-fill fs-4  "></i> User</button>
       </li>
       <li class="nav-item pt-3 pt-lg-0">
        <button class="btn fw-bold violet-button rounded-pill ms-lg-3" id="logoutBtn"><i class="bi bi-door-open fs-4  "></i> Logout</button>
       </li>
     </ul>
   </div>
    
   </div>
       

    </nav>
    <section class="container mt-5">
  <div class="row g-5">
    <div class="col-lg-4 ">
           <div class="card rounded-4">
                      <div class="card-body ">
                        <div class="d-flex justify-content-between align-items-center ">
                             <div>
                                 <p class="textt-muted fs-6 mb-1">Total Tasks</p>
                                 <p class="fw-bold fs-1" id="totalTaskCard"></p>
                           </div>
                            <div>
                                  <i class="bi bi-check-circle fs-3  px-3 py-2 rounded-4 " style="background-color: rgba(124, 104, 238, 0.232); color: rgb(100, 63, 160);"></i>  
                           </div>
                        </div>
                          <div class="progress" style="height: 8px;">
                               <div class="progress-bar" style="width: 100%;background-color: rgb(124, 104, 238);"></div>
                          </div>
                          
                      </div>
           </div>
    </div>
    <div class="col-lg-4 ">
           <div class="card rounded-4">
                      <div class="card-body ">
                        <div class="d-flex justify-content-between align-items-center ">
                             <div>
                                 <p class="textt-muted fs-6 mb-1">Completed</p>
                                 <p class="fw-bold fs-1" id="completeTaskCard"></p>
                           </div>
                            <div>
                                  <i class="bi bi-check fs-3  px-3 py-2 rounded-4 text-success bg-success-subtle " "></i>  
                           </div>
                        </div>
                          <div class="progress" style="height: 8px;">
                               <div class="progress-bar bg-success"  id="completeProgBar"></div>
                          </div>
                          
                      </div>
           </div>
    </div>
    <div class="col-lg-4 ">
           <div class="card rounded-4">
                      <div class="card-body ">
                        <div class="d-flex justify-content-between align-items-center ">
                             <div>
                                 <p class="textt-muted fs-6 mb-1">Pending</p>
                                 <p class="fw-bold fs-1" id="pendingTaskCard"></p>
                           </div>
                            <div>
                                  <i class="bi bi-clock fs-3  px-3 py-2 rounded-4 text-warning bg-warning-subtle " "></i>  
                           </div>
                        </div>
                          <div class="progress" style="height: 8px;">
                               <div class="progress-bar bg-warning" id="pendingProgBar"></div>
                          </div>
                          
                      </div>
           </div>
    </div>
    
    
  </div>
    </section>
    <section class="container py-4 px-3 d-flex flex-column gap-2 mt-5  rounded-5 bg-theme" style="border: 1px solid rgb(100, 63, 160);">

      <div class="d-flex justify-content-between">
         <h3 class="fw-bold text-theme-primary">My Tasks</h3>
         <div>
                 <button class="btn  violet-button fw-bold" id="restoreTask" data-bs-toggle="modal" data-bs-target="#restoreTaskModal">Restore Task</button>
                  <button class="btn text-light fw-bold" id="addTask" data-bs-toggle="modal" data-bs-target="#addTaskModal">Add Task +</button>
         </div>
         <div class="modal fade" id="restoreTaskModal">
              <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                  <div class="modal-header border-0">
                       <h4 class="modal-title ms-auto">Restore Task</h4>
                       <button class="btn btn-close" data-bs-dismiss="modal"></button>
                  </div>
                  <div class="modal-body" id="restoreTaskList">
                       
                  </div>
                </div>
              </div>
         </div>
         <div class="modal fade" id="addTaskModal">
              <div class="modal-dialog modal-dialog-centered">
               <div class="modal-content rounded-5 px-5 py-4 shadow-lg modal-theme">
                  <div class="modal-header border-0">
                       <h4 class="modal-title ms-auto text-theme-primary">Add Task</h4>
                       <button class="btn btn-close" data-bs-dismiss="modal"></button>
                  </div>
                  <div class="modal-body d-flex flex-column gap-2">
                       <label for="addtaskTitle" class="text-theme-secondary">Title</label>
                       <input type="text" name="addtaskTitle" id="addtaskTitle" class="form-control">
                       <label for="addTaskDesc" class="text-theme-secondary">Description</label>
                       <textarea class="form-control text-theme-primary" name="addTaskDesc" id="addTaskDesc"></textarea>
                       <label for="addTaskPrior" class="text-theme-secondary">Set Priority</label>
                       <select class="form-select text-theme-secondary" name="addTaskPrior" id="addTaskPrior">
                        <option value="high" class="text-theme-primary">High Priority</option>
                        <option value="low" class="text-theme-primary">Low Priority</option>
                       </select>
                       <label for="addTaskDueDate" class="text-theme-secondary">Due date</label>
                       <input type="date" name="addTaskDueDate" id="addTaskDueDate">
                  </div>
                  <div class="modal-footer">
                       <button type="button" class="btn text-white" data-bs-dismiss="modal" id="addTaskBtn">Add Task</button>
                  </div>
               </div>
              </div>
         </div>
      </div>
        <div>
          <button class="btn  active-btn fw-bold text-theme-primary" id="allTaskTab">All</button>
          <button class="btn fw-bold text-theme-primary" id="pendTaskTab">Pending</button>
          <button class="btn fw-bold text-theme-primary" id="completeTaskTab">Completed</button>
        </div>
         <div class="modal fade" id="editTaskModal">
              <div class="modal-dialog modal-dialog-centered">
               <div class="modal-content rounded-5 px-5 py-4 shadow-lg modal-theme">
                  <div class="modal-header border-0">
                       <h4 class="modal-title ms-auto text-theme-primary">Update Task</h4>
                       <button class="btn btn-close" data-bs-dismiss="modal"></button>
                  </div>
                  <div class="modal-body">
                       <label for="updatetaskTitle" class="form-label text-theme-secondary">Title</label>
                       <input type="text" name="updatetaskTitle" id="updatetaskTitle" class="form-control">
                       <label for="addTaskDesc" class="form-label text-theme-secondary">Description</label>
                       <textarea class="form-control " name="updateTaskDesc" id="updateTaskDesc"></textarea>
                       <label for="updateTaskPrior" class="form-label text-theme-secondary">Set Priority</label>
                       <select class="form-select " name="updateTaskPrior" id="updateTaskPrior">
                        <option value="high" class="">High Priority</option>
                        <option value="low" class="">Low Priority</option>
                       </select>
                    

                  </div>
                  <div class="modal-footer">
                      <button type="button" class="btn btn-primary" data-bs-dismiss="modal" id="updateTaskBtn">Update Task</button>
                  </div>
               </div>
              </div>
         </div>
       
        <div id="taskList" class="container d-flex flex-column gap-3">
        
          
        
        </div>
    </section>
    <script src="../scripts/server.js"></script>
</body>
</html>
