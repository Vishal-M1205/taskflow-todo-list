    <section class="container mt-5">
  <div class="row g-5">
    <div class="col-lg-4 ">
           <div class="card rounded-4">
                      <div class="card-body ">
                        <div class="d-flex justify-content-between align-items-center ">
                             <div>
                                 <p class="textt-muted fs-6 mb-1">Total Tasks</p>
                                 <p class="fw-bold fs-1">3</p>
                           </div>
                            <div>
                                  <i class="bi bi-check-circle fs-3  px-3 py-2 rounded-4 " style="background-color: rgba(124, 104, 238, 0.232); color: rgb(100, 63, 160);"></i>  
                           </div>
                        </div>
                          <div class="progress" style="height: 8px;">
                               <div class="progress-bar" style="width: 100%;background-color: rgb(124, 104, 238);"></div>
                          </div>
                          
                      </div>
           </div>
    </div>
    <div class="col-lg-4 ">
           <div class="card rounded-4">
                      <div class="card-body ">
                        <div class="d-flex justify-content-between align-items-center ">
                             <div>
                                 <p class="textt-muted fs-6 mb-1">Completed</p>
                                 <p class="fw-bold fs-1">1</p>
                           </div>
                            <div>
                                  <i class="bi bi-check fs-3  px-3 py-2 rounded-4 text-success bg-success-subtle " "></i>  
                           </div>
                        </div>
                          <div class="progress" style="height: 8px;">
                               <div class="progress-bar bg-success" style="width: 33%;"></div>
                          </div>
                          
                      </div>
           </div>
    </div>
    <div class="col-lg-4 ">
           <div class="card rounded-4">
                      <div class="card-body ">
                        <div class="d-flex justify-content-between align-items-center ">

                                 <p class="textt-muted fs-6 mb-1">Pending</p>
                                 <p class="fw-bold fs-1">2</p>
                           </div>
                            <div>
                                  <i class="bi bi-clock fs-3  px-3 py-2 rounded-4 text-warning bg-warning-subtle " "></i>  
                           </div>
                        </div>
                          <div class="progress" style="height: 8px;">
                               <div class="progress-bar bg-warning" style="width: 67%;"></div>
                          </div>
                          
                      </div>
           </div>
    </div>
    
    
  </div>

    <section class="container py-4 px-3 d-flex flex-column gap-2 mt-5  rounded-5" style="background-color: white;border: 1px solid rgb(100, 63, 160);">

         <h3 class="fw-bold">My Tasks</h3>
         <button class="btn text-light fw-bold" id="addTask">Add Task +</button>
      </div>
        <div>
          <button class="btn btn-info active-btn fw-bold">All</button>
          <button class="btn fw-bold">Pending</button>
          <button class="btn fw-bold">Completed</button>
        </div>
        <div class="container d-flex flex-column gap-3">

            <div class="card-body d-flex justify-content-between">

                      <button class="btn text-danger fs-4 rounded-2 border-1 border-secondary-subtle py-2 border trash-btn  "><i class="bi bi-trash"></i></button>

            </div>
          </div>

          </div>
        </div>
